nameOverride: auth-service
fullnameOverride: auth-service
image:
  repository: 014498640042.dkr.ecr.eu-west-2.amazonaws.com/auth-service
  tag: dev-4f2619f

env:
  - name: REPO_BACKEND
    value: postgres
  - name: PORT
    value: "8080"
  - name: DB_HOST
    value: smartovate-intern-yassine-pg.cba8u0meqrv7.eu-west-2.rds.amazonaws.com
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: auth_db
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: db-credentials
        key: DB_USER
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db-credentials
        key: DB_PASSWORD
  - name: REDIS_HOST
    value: redis
  - name: REDIS_PORT
    value: "6379"
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: auth-service-secrets
        key: JWT_SECRET
  - name: JWT_ISSUER
    value: ktor-microservices-kit

probes:
  liveness:
    path: /auth/health
  readiness:
    path: /auth/ready
