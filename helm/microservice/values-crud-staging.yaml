nameOverride: crud-service
fullnameOverride: crud-service
image:
  repository: 014498640042.dkr.ecr.eu-west-2.amazonaws.com/crud-service
  tag: dev-4f2619f

env:
  - name: REPO_BACKEND
    value: postgres
  - name: PORT
    value: "8080"
  - name: DB_HOST
    value: smartovate-intern-yassine-pg.cba8u0meqrv7.eu-west-2.rds.amazonaws.com
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: crud_db
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: db-credentials
        key: DB_USER
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db-credentials
        key: DB_PASSWORD

probes:
  liveness:
    path: /items/health
  readiness:
    path: /items/ready
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
