apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: smartovate-intern-yassine
  region: eu-west-2
  version: "1.31"
  tags:
    project: smartovate-eks-internship
    owner: kaibi.0yassine@gmail.com
    env: staging

vpc:
  cidr: 10.1.0.0/16
  nat:
    gateway: Single
  clusterEndpoints:
    publicAccess: true
    privateAccess: false

managedNodeGroups:
  - name: smartovate-intern-ng
    instanceType: t3.medium
    minSize: 1
    desiredCapacity: 2
    maxSize: 4
    volumeSize: 20
    amiFamily: AmazonLinux2
    labels:
      role: worker
    tags:
      project: smartovate-eks-internship
      owner: yassine
    iam:
      withAddonPolicies:
        autoScaler: true
        cloudWatch: true
        albIngress: true

cloudWatch:
  clusterLogging:
    enableTypes: ["api", "audit", "authenticator", "controllerManager", "scheduler"]
