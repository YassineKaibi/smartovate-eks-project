apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YassineKaibi/smartovate-eks-project
    targetRevision: main
    path: gitops/staging
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
