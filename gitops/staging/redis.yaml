apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-redis
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YassineKaibi/smartovate-eks-project
    targetRevision: main
    path: k8s/staging
    directory:
      include: redis.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
